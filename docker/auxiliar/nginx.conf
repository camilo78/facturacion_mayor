server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 10M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # [10] Livewire genera assets dinámicos con rutas tipo /livewire-*/livewire.js
    # Esta regla DEBE ir antes de la de estáticos, o nginx devuelve 404 al no
    # encontrar el archivo en disco (son generados por PHP, no existen en public/).
    location ~* ^/livewire- {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 120;
        include fastcgi_params;
    }

    # Archivos estáticos con caché larga.
    # Fallback a PHP (no =404) para assets generados dinámicamente que pasan por aquí.
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri /index.php?$query_string;
    }

    location ~ /\.ht {
        deny all;
    }

    access_log /dev/stdout;
    error_log  /dev/stderr warn;
}
